<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跃民的煎饼摊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6; 
            color: #64748d; 
            background: #ffffff; 
            max-width: 1080px; 
            margin: 0 auto; 
            padding: 20px;
            font-weight: 300;
        }
        
        /* 导航 */
        nav { 
            margin-bottom: 40px; 
            padding: 16px 0; 
            border-bottom: 1px solid #e5edf5; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .nav-links { display: flex; gap: 32px; }
        
        nav a { 
            color: #061b31; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 400;
            transition: color 0.2s;
        }
        
        nav a:hover { 
            color: #533afd; 
            text-decoration: none; 
        }
        
        /* 英雄区域 */
        .hero {
            margin: 80px 0;
            text-align: center;
        }
        
        .hero h1 { 
            color: #061b31; 
            font-size: 48px; 
            font-weight: 300; 
            line-height: 1.15; 
            letter-spacing: -0.96px;
            margin-bottom: 20px;
        }
        
        .hero p { 
            color: #64748d; 
            font-size: 18px; 
            font-weight: 300;
            line-height: 1.4;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        
        /* 按钮 */
        .btn-primary {
            display: inline-block;
            padding: 12px 24px;
            background: #533afd;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 400;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            background: #4434d4;
            text-decoration: none;
            color: #ffffff;
        }
        
        /* 文章卡片 */
        .post { 
            margin: 40px 0; 
            padding: 32px; 
            border: 1px solid #e5edf5; 
            border-radius: 6px;
            background: #ffffff;
            box-shadow: rgba(50,50,93,0.25) 0px 13px 27px -5px, rgba(0,0,0,0.1) 0px 8px 16px -8px;
            transition: box-shadow 0.3s, transform 0.3s;
        }
        
        .post:hover {
            box-shadow: rgba(50,50,93,0.25) 0px 30px 60px -15px, rgba(0,0,0,0.1) 0px 18px 36px -18px;
            transform: translateY(-2px);
        }
        
        .post h2 { 
            color: #061b31; 
            font-size: 26px; 
            font-weight: 300; 
            line-height: 1.12; 
            letter-spacing: -0.26px;
            margin-bottom: 12px;
        }
        
        .post h2 a {
            color: #061b31;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .post h2 a:hover {
            color: #533afd;
            text-decoration: none;
        }
        
        .date { 
            color: #64748d; 
            font-size: 13px; 
            font-weight: 400;
            margin-bottom: 16px;
        }
        
        .post-content {
            color: #64748d;
            font-size: 16px;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .btn-secondary {
            display: inline-block;
            padding: 8px 16px;
            background: transparent;
            color: #533afd;
            text-decoration: none;
            border: 1px solid #b9b9f9;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 400;
            transition: background 0.2s;
        }
        
        .btn-secondary:hover {
            background: rgba(83,58,253,0.05);
            text-decoration: none;
            color: #533afd;
        }
        
        /* 区域标题 */
        .section-title {
            color: #061b31;
            font-size: 32px;
            font-weight: 300;
            line-height: 1.10;
            letter-spacing: -0.64px;
            margin: 60px 0 30px;
        }
        
        /* 页脚 */
        footer { 
            margin-top: 80px; 
            padding: 40px 0; 
            border-top: 1px solid #e5edf5; 
            color: #64748d; 
            font-size: 13px; 
            text-align: center;
            font-weight: 400;
        }
        
        footer a {
            color: #533afd;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        /* 响应式 */
        @media (max-width: 640px) {
            .hero h1 { font-size: 32px; letter-spacing: -0.64px; }
            .hero p { font-size: 16px; }
            .post h2 { font-size: 22px; letter-spacing: -0.22px; }
            .section-title { font-size: 26px; letter-spacing: -0.26px; }
            nav { flex-direction: column; gap: 16px; }
            .nav-links { gap: 20px; }
        }
    </style>
</head>
<body>

        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/posts/">文章</a>
            <a href="/about/">关于</a>

    </nav>

    <main>

            <a href="/posts/" class="btn-primary">浏览文章 →</a>
        </div>

        <h2 class="section-title">最新文章</h2>

        <div class="post">

        <div class="post">

            <div class="post-content">

            </div>
            <a href="/posts/ai-product-thinking.html" class="btn-secondary">阅读全文 →</a>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 张锡安 · <a href="https://github.com/googolxi">GitHub</a> · googolxi@gmail.com</p>
    </footer>

</html>
